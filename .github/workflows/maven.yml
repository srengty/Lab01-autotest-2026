
name: Java CI with Test Mannually

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with javac
      run: javac -d bin $(find src -name '*.java')
    - name: Test using JUnit Jupiter
      run: java -jar ./lib/junit-platform-console-standalone-1.13.0-M3.jar execute --class-path bin --scan-class-path
